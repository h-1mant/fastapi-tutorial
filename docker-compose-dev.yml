services:
  api:
    build: .
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    volumes:
      - ./:/usr/src/app:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
  postgres:
    image: postgres
    environment:
      - POSTGRES_PASSWORD=admin
      - POSTGRES_USERNAME=postgres
      - POSTGRES_DB=fastapi
      - DATABASE_HOSTNAME=postgres
    volumes:
      - postgres-db:/var/lib/postgresql
volumes:
  postgres-db: 

